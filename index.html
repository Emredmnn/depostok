<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISS Akıllı Depo - İşlem Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<script>
    if (!localStorage.getItem('aktifKullanici')) { window.location.href = "login.html"; }
</script>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-sm-12">
            <div class="card p-4 shadow border-0" style="border-radius:15px;">
                <div class="d-flex justify-content-between mb-3">
                    <span class="badge bg-secondary" id="lblKategori">Depo: -</span>
                    <span class="badge bg-primary" id="lblMevcutStok">Mevcut: -</span>
                </div>
                <h3 class="fw-bold text-center" id="lblMalzemeAdi">Yükleniyor...</h3>
                <p class="text-center text-muted small mb-3" id="lblUrunId">#</p>
                <hr>
                <form id="formDepoIslem">
                    <div class="mb-3">
                        <label class="form-label fw-bold">İşlem Yapan Yetkili:</label>
                        <input type="text" class="form-control bg-light fw-bold" id="txtAktifUser" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold" id="lblMiktarAlan">Miktar:</label>
                        <input type="number" class="form-control form-control-lg text-center" id="miktar" min="1" placeholder="Miktar giriniz" required>
                    </div>
                    <button type="submit" class="btn btn-lg w-100 fw-bold text-white" id="btnOnay">Onayla</button>
                </form>
                <a href="depo_listesi.html" class="btn btn-link text-center mt-3 text-decoration-none">← İptal Et ve Dön</a>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAn1CoIY21XaN-EXMOJSCuMGBhW8k_Q3FU",
        authDomain: "depo-stok-f6389.firebaseapp.com",
        databaseURL: "https://depo-stok-f6389-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "depo-stok-f6389",
        storageBucket: "depo-stok-f6389.firebasestorage.app",
        messagingSenderId: "884521404368",
        appId: "1:884521404368:web:ea7392975933c5a2415bd5"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const aktifUser = localStorage.getItem('aktifKullanici');
    document.getElementById('txtAktifUser').value = aktifUser;

    const urlParametreleri = new URLSearchParams(window.location.search);
    const urunId = urlParametreleri.get('id'); 
    const islemTipi = urlParametreleri.get('tip');

    let depoVeritabani = {};
    let islemGecmisi = [];
    let secilenUrun = null;

    get(ref(database, 'depoVerisi')).then((snapshot) => {
        depoVeritabani = snapshot.val() || {};
        secilenUrun = depoVeritabani[urunId];

        if (secilenUrun) {
            // Güvenli sayı dönüşümü
            secilenUrun.stok = parseInt(secilenUrun.stok) || 0;

            document.getElementById('lblMalzemeAdi').innerText = secilenUrun.adi;
            document.getElementById('lblKategori').innerText = "Depo: " + secilenUrun.kategori;
            document.getElementById('lblMevcutStok').innerText = `Depoda Var: ${secilenUrun.stok}`;
            document.getElementById('lblUrunId').innerText = "Ürün ID: #" + urunId;

            const btn = document.getElementById('btnOnay');
            if (islemTipi === 'ekle') {
                document.getElementById('lblMiktarAlan').innerText = "Eklenecek Miktar:";
                btn.innerText = "Stok Girişini Onayla"; btn.classList.add('btn-success');
            } else {
                document.getElementById('lblMiktarAlan').innerText = "Düşülecek Miktar:";
                btn.innerText = "Stoktan Düşmeyi Onayla"; btn.classList.add('btn-danger');
            }
        }
    });

    get(ref(database, 'islemGecmisi')).then((snapshot) => {
        islemGecmisi = snapshot.val() || [];
    });

    document.getElementById('formDepoIslem').addEventListener('submit', function(e) {
        e.preventDefault();
        const miktar = parseInt(document.getElementById('miktar').value);

        if (islemTipi === 'dus' && miktar > secilenUrun.stok) {
            alert(`Hata: Depoda yeterli ürün yok!`); 
            return;
        }

        if (islemTipi === 'dus') { 
            secilenUrun.stok -= miktar; 
        } else { 
            secilenUrun.stok += miktar; 
        }
        
        islemGecmisi.unshift({
            tarih: new Date().toLocaleString('tr-TR'),
            personel: aktifUser,
            depoAdi: secilenUrun.kategori,
            malzeme: secilenUrun.adi,
            miktar: miktar,
            tip: islemTipi
        });

        set(ref(database, 'depoVerisi'), depoVeritabani);
        set(ref(database, 'islemGecmisi'), islemGecmisi).then(() => {
            window.location.href = "depo_listesi.html";
        });
    });
</script>
</body>
</html>
