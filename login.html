<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISS Depo - Personel Girişi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); background: #ffffff; max-width: 400px; width: 100%; }
    </style>
</head>
<body>

<div class="card login-card p-4 mx-3">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-dark">ISS İkram & Catering</h3>
        <p class="text-muted small">Akıllı Depo Otomasyonu v2026</p>
    </div>
    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label fw-semibold">Personel Adı / Yetkili</label>
            <input type="text" id="username" class="form-control form-control-lg" placeholder="Adınızı ve Soyadınızı giriniz" required autocomplete="off">
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Giriş Şifresi</label>
            <input type="password" id="password" class="form-control form-control-lg" placeholder="••••" required>
        </div>
        <button type="submit" id="btnGiris" class="btn btn-primary btn-lg w-100 fw-bold">Sisteme Giriş Yap</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const user = document.getElementById('username').value.trim();
        const sifre = document.getElementById('password').value;

        if (!user) {
            alert("Lütfen personel adınızı giriniz!");
            return;
        }

        if(sifre === "1234") {
            localStorage.setItem('aktifKullanici', user);
            window.location.replace("depo_listesi.html");
        } else {
            alert("Hatalı Giriş Şifresi! Lütfen tekrar deneyiniz.");
        }
    });
</script>
</body>
</html>
