<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Bahçelievler Memorial CT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: radial-gradient(circle at center, #1a1c20 0%, #0a0b0d 100%); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        /* Tasarladığım Logoyu SVG (Vektörel) Olarak Buraya Gömdüm */
        .custom-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(13, 110, 253, 0.5));
        }

        .login-card { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 45px; 
            border-radius: 20px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            border-top: 6px solid #0d6efd;
            z-index: 10;
        }

        .brand-name {
            color: #212529;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .sub-brand {
            color: #6c757d;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .form-group { margin-bottom: 18px; text-align: left; position: relative; }
        label { display: block; margin-bottom: 7px; font-weight: 700; font-size: 12px; color: #495057; text-transform: uppercase; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e9ecef; 
            border-radius: 10px; 
            font-size: 14px; 
            transition: all 0.3s; 
            background: #f8f9fa;
        }

        input:focus { border-color: #0d6efd; background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1); }

        .btn-login { 
            width: 100%; 
            padding: 15px; 
            background: #0d6efd; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: 800; 
            font-size: 15px; 
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-login:hover { background: #004dc7; transform: translateY(-2px); }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 36px;
            background: none;
            border: none;
            color: #0d6efd;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-card">
    <!-- Tasarladığım Vektörel Logo -->
    <svg class="custom-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" stroke="#0d6efd" stroke-width="2" stroke-dasharray="10 5"/>
        <path d="M30 35H70V65H30V35Z" stroke="#212529" stroke-width="3"/>
        <path d="M30 45H70" stroke="#212529" stroke-width="2"/>
        <path d="M30 55H70" stroke="#212529" stroke-width="2"/>
        <path d="M40 35V65" stroke="#212529" stroke-width="2"/>
        <path d="M60 35V65" stroke="#212529" stroke-width="2"/>
        <rect x="42" y="37" width="16" height="6" fill="#ffc107" rx="1"/>
        <text x="50" y="85" text-anchor="middle" fill="#0d6efd" font-size="14" font-weight="900" font-family="Arial">ED STOCK</text>
    </svg>

    <div class="brand-name">BAHÇELİEVLER MEMORIAL CT</div>
    <div class="sub-brand">AKILLI DEPO OTOMASYONU</div>

    <form id="loginForm">
        <div class="form-group">
            <label>Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="Kullanıcı adı" required>
        </div>
        <div class="form-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">GÖSTER</button>
        </div>
        <button type="submit" class="btn-login">Giriş Yap</button>
    </form>
</div>

<script>
    function togglePasswordVisibility() {
        const p = document.getElementById('password');
        p.type = p.type === 'password' ? 'text' : 'password';
    }
    // Giriş mantığını önceki kodundan buraya kopyalayabilirsin.
</script>
</body>
</html>
