<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Bahçelievler Memorial CT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #f4f6f9 0%, #e9ecef 100%); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 420px; border-top: 5px solid #0d6efd; text-align: center; }
        .logo-area { margin-bottom: 25px; }
        .logo-area h2 { color: #0d6efd; font-size: 22px; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 5px; text-transform: uppercase; }
        .logo-area p { color: #6c757d; font-size: 14px; font-weight: 600; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: #495057; }
        input, select { width: 100%; padding: 12px; border: 2px solid #dee2e6; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #0d6efd; }
        .btn-login { width: 100%; padding: 14px; background: #0d6efd; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn-login:hover { background: #0b5ed7; }
        .error-msg { color: #dc3545; font-size: 13px; margin-top: 12px; font-weight: 600; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <h2>BAHÇELİEVLER MEMORİAL CT</h2>
        <p>Canlı Stok Takip Sistemi</p>
    </div>
    <form id="loginForm">
        <div class="form-group">
            <label>Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="Kullanıcı adınızı girin" required>
        </div>
        <div class="form-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div class="form-group">
            <label>Çalışma Rolünüz / Biriminiz</label>
            <select id="userRole">
                <option value="YÖNETİCİ">YÖNETİCİ Panel Girişi</option>
                <option value="ÜRETİM">ÜRETİM / Mutfak Girişi</option>
                <option value="GARSON">GARSON / Kat Servis Girişi</option>
            </select>
        </div>
        <button type="submit" class="btn-login">Sisteme Güvenli Giriş Yap</button>
        <div class="error-msg" id="errorMsg">⚠️ Kullanıcı adı veya şifre hatalı!</div>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const role = document.getElementById('userRole').value;

        // Statik hesap doğrulaması (İhtiyaca göre çoğaltılabilir)
        if((user === "admin" && pass === "1234") || (user === "mutfak" && pass === "1234") || (user === "garson" && pass === "1234")) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userRole', role);
            window.location.replace('index.html');
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    });
</script>
</body>
</html>
