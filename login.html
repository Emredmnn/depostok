<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Bahçelievler Memorial CT</title>
    <style>
        /* --- TEMEL AYARLAR --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: #f0f4f8;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 51, 141, 0.03) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(0, 51, 141, 0.05) 0, transparent 50%);
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        /* --- KART ANİMASYONU --- */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .login-card { 
            background: white; 
            padding: 45px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0, 51, 141, 0.1); 
            width: 100%; 
            max-width: 420px; 
            border-top: 6px solid #00338d; 
            text-align: center; 
            animation: fadeInScale 0.6s ease-out;
            position: relative;
            z-index: 2;
        }

        /* --- LOGO VE BAŞLIK --- */
        .logo-area { margin-bottom: 30px; }
        .login-logo { max-height: 85px; width: auto; object-fit: contain; margin-bottom: 15px; }
        .logo-area h2 { color: #00338d; font-size: 20px; font-weight: 800; letter-spacing: 0.3px; margin-bottom: 5px; text-transform: uppercase; }
        .logo-area p { color: #64748b; font-size: 14px; font-weight: 600; }

        /* --- FORM ELEMANLARI --- */
        .form-group { margin-bottom: 22px; text-align: left; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 13px; color: #334155; }
        
        input[type="text"], input[type="password"] { 
            width: 100%; padding: 13px 15px; padding-right: 65px;
            border: 2px solid #e2e8f0; border-radius: 12px; 
            font-size: 14px; outline: none; transition: all 0.3s ease; color: #1e293b;
            background: #f8fafc;
        }
        input:focus { 
            border-color: #00338d; 
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 51, 141, 0.08); 
        }

        .toggle-password { 
            position: absolute; right: 15px; top: 38px; background: none; border: none; 
            cursor: pointer; color: #94a3b8; font-weight: 700; font-size: 11px; outline: none; 
        }
        .toggle-password:hover { color: #00338d; }

        .remember-me-container { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
        .remember-me-container input { width: 18px; height: 18px; cursor: pointer; accent-color: #00338d; }
        .remember-me-container label { font-size: 13px; color: #475569; cursor: pointer; user-select: none; font-weight: 600; }

        /* --- GİRİŞ BUTONU --- */
        .btn-login { 
            width: 100%; padding: 16px; background: #00338d; color: white; border: none; 
            border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 4px 12px rgba(0, 51, 141, 0.2); 
        }
        .btn-login:hover { 
            background: #00225c; 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(0, 51, 141, 0.3); 
        }
        .btn-login:active { transform: scale(0.98); }

        /* --- SİSTEM DURUMU --- */
        .system-status { margin-top: 18px; font-size: 11px; color: #94a3b8; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .error-msg { color: #dc3545; font-size: 13px; margin-top: 15px; font-weight: 700; display: none; }

        /* --- FOOTER --- */
        footer { 
            position: absolute; bottom: 20px; text-align: center; width: 100%; color: #94a3b8; font-size: 11px; font-weight: 600; line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <img src="akilli_depo_logo.jpeg.jpeg" alt="Logo" class="login-logo">
        <h2>BAHÇELİEVLER MEMORİAL CT</h2>
        <p>Akıllı Depo Otomasyon Sistemi</p>
    </div>
    <form id="loginForm">
        <div class="form-group">
            <label>Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="Kullanıcı adınızı girin" required autocomplete="username">
        </div>
        <div class="form-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-password" id="togglePasswordBtn" onclick="togglePasswordVisibility()">GÖSTER</button>
        </div>
        
        <div class="remember-me-container">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Beni Hatırla</label>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">Sisteme Güvenli Giriş Yap</button>
        
        <div class="system-status">
            <span class="status-dot"></span> Sistem Durumu: Aktif ve Güvenli
        </div>
        
        <div class="error-msg" id="errorMsg">⚠️ Kullanıcı adı veya şifre hatalı!</div>
    </form>
</div>

<footer>
    v2.5.0 - 2026<br>
    ED Yazılım | Akıllı Depo Sistemleri tarafından geliştirilmiştir.<br>
    <span style="font-size: 9px; opacity: 0.7;">🔒 Verileriniz 256-bit uçtan uca şifrelenmektedir.</span>
</footer>

<script>
    // Beni Hatırla Kontrolü
    document.addEventListener("DOMContentLoaded", function() {
        const savedUser = localStorage.getItem('rememberedUsername');
        if (savedUser) {
            document.getElementById('username').value = savedUser;
            document.getElementById('rememberMe').checked = true;
        }
    });

    // Şifre Göster/Gizle
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePasswordBtn');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.textContent = 'GİZLE';
        } else {
            passwordInput.type = 'password';
            toggleBtn.textContent = 'GÖSTER';
        }
    }

    // Giriş Fonksiyonu
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const originalText = btn.textContent;
        
        // Yükleme efekti
        btn.disabled = true;
        btn.textContent = "Giriş yapılıyor...";
        
        let userInput = document.getElementById('username').value.trim().toLowerCase();
        let user = userInput.replace(/ı/g, 'i').replace(/ğ/g, 'g').replace(/ü/g, 'u').replace(/ş/g, 's').replace(/ö/g, 'o').replace(/ç/g, 'c');
        
        const pass = document.getElementById('password').value;
        const rememberMeChecked = document.getElementById('rememberMe').checked;

        let detectedRole = "";

        // Şifre Matrisi
        if ((user === "yonetici" || userInput === "yönetici") && pass === "2605") {
            detectedRole = "YÖNETİCİ";
        } else if (user === "garson" && pass === "2222") {
            detectedRole = "GARSON";
        } else if ((user === "uretim" || userInput === "üretim") && pass === "3333") {
            detectedRole = "ÜRETİM";
        } else if (user === "depo" && pass === "1111") {
            detectedRole = "DEPO";
        }

        setTimeout(() => { // Gerçekçi bir gecikme hissi
            if (detectedRole !== "") {
                if (rememberMeChecked) {
                    localStorage.setItem('rememberedUsername', document.getElementById('username').value.trim());
                } else {
                    localStorage.removeItem('rememberedUsername');
                }

                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userRole', detectedRole);
                window.location.replace('index.html');
            } else {
                btn.disabled = false;
                btn.textContent = originalText;
                document.getElementById('errorMsg').style.display = 'block';
            }
        }, 800);
    });
</script>
</body>
</html>
