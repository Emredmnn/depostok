<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depo Stok Takibi</title>
    <!-- Modern Yazı Tipi Entegrasyonu -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
        }
        .login-card { 
            border: none; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            background: #ffffff; 
            max-width: 400px; 
            width: 100%; 
        }
        .main-title {
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.5px;
        }
        .input-group-text { 
            cursor: pointer; 
            background-color: #f8f9fa; 
            border-right: none;
        }
        .form-control {
            border-left: none;
        }
        .form-control:focus {
            border-color: #dee2e6;
            box-shadow: none;
        }
        .btn-primary {
            background-color: #0f172a;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="card login-card p-5 mx-3">
    <div class="text-center mb-4">
        <!-- İstediğin Yeni Başlık Formatı -->
        <h2 class="main-title mb-1">depo stok takibi</h2>
        <div style="width: 50px; height: 3px; background-color: #3b82f6; margin: 10px auto; border-radius: 2px;"></div>
    </div>
    <form id="loginForm">
        <!-- 👤 Manuel Kullanıcı Adı Girişi -->
        <div class="mb-3">
            <label class="form-label fw-semibold text-secondary small">Kullanıcı Adı / Yetkili</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person-fill text-muted"></i></span>
                <input type="text" id="username" class="form-control form-control-lg" placeholder="Kullanıcı adınız" required autocomplete="off">
            </div>
        </div>
        
        <!-- 🔒 Şifre Alanı (Göz İkonlu) -->
        <div class="mb-3">
            <label class="form-label fw-semibold text-secondary small">Giriş Şifresi</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill text-muted"></i></span>
                <input type="password" id="password" class="form-control form-control-lg" placeholder="••••" required>
                <span class="input-group-text" id="togglePassword" style="border-left: none;">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </span>
            </div>
        </div>

        <!-- 📌 Beni Hatırla Seçeneği -->
        <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="beniHatirla">
            <label class="form-check-label text-muted small fw-semibold" for="beniHatirla">Kullanıcı Adımı Hatırla</label>
        </div>
        
        <button type="submit" id="btnGiris" class="btn btn-primary btn-lg w-100 fw-bold py-3 shadow-sm">Sisteme Giriş Yap</button>
    </form>
</div>

<script>
    // 🔑 Güncellenmiş Şifre Tanımlamaları (Yönetici şifresi: 2605 yapıldı)
    const personelVeritabani = {
        "yonetici": { orijinalAd: "Yönetici", sifre: "2605" },
        "depo": { orijinalAd: "Depo", sifre: "1111" },
        "uretim": { orijinalAd: "Üretim", sifre: "2222" },
        "garson": { orijinalAd: "Garson", sifre: "3333" }
    };

    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const beniHatirlaCheckbox = document.getElementById('beniHatirla');

    // 🔄 Sayfa yüklendiğinde "Beni Hatırla" kontrolü
    window.addEventListener('DOMContentLoaded', () => {
        const hatirlananUser = localStorage.getItem('hatirlananKullanici');
        if (hatirlananUser) {
            usernameInput.value = hatirlananUser;
            beniHatirlaCheckbox.checked = true;
        }
    });

    // 👁️ Şifre Göster / Gizle Mantığı
    const togglePassword = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        if (type === 'text') {
            eyeIcon.classList.remove('bi-eye');
            eyeIcon.classList.add('bi-eye-slash');
        } else {
            eyeIcon.classList.remove('bi-eye-slash');
            eyeIcon.classList.add('bi-eye');
        }
    });

    // 🚪 Giriş Kontrol Formu
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const girilenUser = usernameInput.value.trim();
        const girilenSifre = passwordInput.value.trim(); // Boşluk hatalarını engellemek için trim eklendi

        // Karakterleri tamamen Türkçe uyuşmazlığından arındırma (Giriş problemini çözen kısım)
        const aramaKey = girilenUser.toLowerCase()
                                    .replace(/ı/g, 'i')
                                    .replace(/ü/g, 'u')
                                    .replace(/ö/g, 'o')
                                    .replace(/ş/g, 's')
                                    .replace(/ç/g, 'c')
                                    .replace(/ğ/g, 'g')
                                    .replace(/i̇/g, 'i'); // Özel i harfi senkronu

        if (personelVeritabani[aramaKey]) {
            const personel = personelVeritabani[aramaKey];
            
            // Şifre Doğrulama
            if (personel.sifre === girilenSifre) {
                // `localStorage` temizliği yaparak olası tarayıcı şişmelerini engelliyoruz
                localStorage.setItem('aktifKullanici', personel.orijinalAd);
                
                if (beniHatirlaCheckbox.checked) {
                    localStorage.setItem('hatirlananKullanici', girilenUser);
                } else {
                    localStorage.removeItem('hatirlananKullanici');
                }

                // Yönlendirme tetikleyicisi
                window.location.href = "depo_listesi.html";
            } else {
                alert("Hatalı Giriş Şifresi! Lütfen tekrar deneyiniz.");
            }
        } else {
            alert("Kullanıcı bulunamadı! Lütfen geçerli bir kullanıcı adı giriniz.");
        }
    });
</script>
</body>
</html>
