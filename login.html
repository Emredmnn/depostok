<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Bahçelievler Memorial CT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            /* Arka planı logonun koyu tonlarına uygun hale getirdik */
            background: radial-gradient(circle, #212529 0%, #0a0b0d 100%); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
            overflow: hidden;
        }

        /* Arka planda logonun çok hafif ve büyük bir yansıması */
        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: url('ed stok logo.jpg') no-repeat center center;
            background-size: contain;
            opacity: 0.05; 
            pointer-events: none;
        }

        .login-card { 
            background: rgba(255, 255, 255, 0.97); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 420px; 
            border-top: 6px solid #0d6efd; 
            text-align: center; 
            position: relative;
            z-index: 2;
            backdrop-filter: blur(10px);
        }

        .logo-area { margin-bottom: 25px; }
        
        /* Yeni logonun yerleşimi */
        .logo-img { 
            width: 180px; 
            height: auto; 
            margin-bottom: 15px; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-area h2 { color: #212529; font-size: 18px; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 5px; text-transform: uppercase; }
        .logo-area p { color: #6c757d; font-size: 13px; font-weight: 600; }
        
        .form-group { margin-bottom: 20px; text-align: left; position: relative; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: #495057; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            padding-right: 65px; 
            border: 2px solid #dee2e6; 
            border-radius: 8px; 
            font-size: 14px; 
            outline: none; 
            transition: all 0.2s; 
            background: #f8f9fa; 
        }
        
        input:focus { border-color: #0d6efd; background: #fff; box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1); }
        
        .toggle-password { position: absolute; right: 12px; top: 34px; background: none; border: none; cursor: pointer; color: #0d6efd; font-weight: 700; font-size: 11px; outline: none; }
        
        .remember-me-container { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; text-align: left; }
        .remember-me-container input { width: 16px; height: 16px; cursor: pointer; }

        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: #0d6efd; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        
        .btn-login:hover { background: #0b5ed7; transform: translateY(-1px); }
        .error-msg { color: #dc3545; font-size: 13px; margin-top: 12px; font-weight: 600; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <!-- Belirttiğin görsel ismi eklendi -->
        <img src="ed stok logo.jpg" alt="ED Depo Stok" class="logo-img">
        <h2>BAHÇELİEVLER MEMORİAL CT</h2>
        <p>Canlı Stok Takip Sistemi</p>
    </div>
    <form id="loginForm">
        <div class="form-group">
            <label>Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="Kullanıcı adınızı girin" required>
        </div>
        <div class="form-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="button" class="toggle-password" id="togglePasswordBtn" onclick="togglePasswordVisibility()">GÖSTER</button>
        </div>
        
        <div class="remember-me-container">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe" style="font-size: 13px; cursor: pointer;">Beni Hatırla</label>
        </div>

        <button type="submit" class="btn-login">Sisteme Güvenli Giriş Yap</button>
        <div class="error-msg" id="errorMsg">⚠️ Kullanıcı adı veya şifre hatalı!</div>
    </form>
</div>

<script>
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePasswordBtn');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.textContent = 'GİZLE';
        } else {
            passwordInput.type = 'password';
            toggleBtn.textContent = 'GÖSTER';
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let userInput = document.getElementById('username').value.trim().toLowerCase();
        let user = userInput.replace(/ı/g, 'i').replace(/ğ/g, 'g').replace(/ü/g, 'u').replace(/ş/g, 's').replace(/ö/g, 'o').replace(/ç/g, 'c');
        const pass = document.getElementById('password').value;
        const rememberMeChecked = document.getElementById('rememberMe').checked;

        let detectedRole = "";

        // Şifre kontrolleri
        if ((user === "yonetici") && pass === "2605") detectedRole = "YÖNETİCİ";
        else if (user === "garson" && pass === "2222") detectedRole = "GARSON";
        else if (user === "uretim" && pass === "3333") detectedRole = "ÜRETİM";
        else if (user === "depo" && pass === "1111") detectedRole = "DEPO";

        if (detectedRole !== "") {
            if (rememberMeChecked) localStorage.setItem('rememberedUsername', document.getElementById('username').value);
            else localStorage.removeItem('rememberedUsername');

            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userRole', detectedRole);
            window.location.replace('index.html');
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    });
</script>
</body>
</html>
